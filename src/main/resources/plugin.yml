name: SimpleVoiceRadio
version: '0.0.5'
main: dev.nybikyt.simpleVoiceRadio.SimpleVoiceRadio
api-version: '1.19.4'
author: Nybik_YT
website: https://modrinth.com/plugin/simple-voice-radio
description: Plugin that adds a radio block that lets players communicate over distances

depend:
  - voicechat
  - packetevents

softdepend:
  - CustomDiscs

commands:
  simple_voice_radio:
    description: Main command for SimpleVoiceRadio
    permission: simple_voice_radio.command
    usage: |
      /<command> reload
      /<command> give <player>
      /<command> view_craft
      /<command> play_audio <file|url|stop> [value]

permissions:
  simple_voice_radio.command:
    description: Can player use the plugin's command?
    default: op
    children:
      simple_voice_radio.reload_config: true
      simple_voice_radio.give: true
      simple_voice_radio.can_view_craft: true
      simple_voice_radio.play_audio: true
  simple_voice_radio.reload_config:
    description: Can player reload plugin's config?
    default: op
  simple_voice_radio.give:
    description: Can player give radio?
    default: op
  simple_voice_radio.can_view_craft:
    description: Can player view radio craft?
    default: op
  simple_voice_radio.play_audio:
    description: Can player broadcast audio to all output radios?
    default: op
  simple_voice_radio.can_craft:
    description: Can player craft radio-block?
    default: true
  simple_voice_radio.can_change_frequency:
    description: Can player specify radio-block frequency?
    default: true
  simple_voice_radio.can_switch_mode:
    description: Can player switch radio-block mode?
    default: true
  simple_voice_radio.can_broadcast:
    description: Can player broadcast via radio-block?
    default: true